{% extends 'base.html' %}

{% block content %}

<h2>Student Profile</h2>

<form method="POST">

<div class="mb-3">
<label>Full Name</label>
<input
type="text"
name="full_name"
class="form-control"
value="{{ profile.full_name if profile else '' }}">
</div>

<div class="mb-3">
<label>Phone</label>
<input
type="text"
name="phone"
class="form-control"
value="{{ profile.phone if profile else '' }}">
</div>

<div class="mb-3">
<label>College</label>
<input
type="text"
name="college"
class="form-control"
value="{{ profile.college if profile else '' }}">
</div>

<div class="mb-3">
<label>Degree</label>
<input
type="text"
name="degree"
class="form-control"
value="{{ profile.degree if profile else '' }}">
</div>

<div class="mb-3">
<label>Graduation Year</label>
<input
type="number"
name="graduation_year"
class="form-control"
value="{{ profile.graduation_year if profile else '' }}">
</div>

<div class="mb-3">
<label>LinkedIn</label>
<input
type="text"
name="linkedin"
class="form-control"
value="{{ profile.linkedin if profile else '' }}">
</div>

<div class="mb-3">
<label>GitHub</label>
<input
type="text"
name="github"
class="form-control"
value="{{ profile.github if profile else '' }}">
</div>

<div class="mb-3">
<label>About Me</label>
<textarea
name="bio"
class="form-control"
rows="5">{{ profile.bio if profile else '' }}</textarea>
</div>

<button class="btn btn-primary">
Save Profile
</button>

</form>

{% endblock %}
